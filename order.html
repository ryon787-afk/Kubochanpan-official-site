<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ご注文｜くぼちゃんパン</title><link rel="stylesheet" href="style.css"></head><body><header class="header"><div class="header-inner"><a class="logo" href="index.html"><span>くぼちゃんパン</span><small>Official Shop</small></a><a class="btn sub" href="index.html">トップへ</a></div></header><main class="section"><div class="container"><h1 class="section-title">ご注文手続き</h1><div class="privacy-note"><strong>個人情報の安全について</strong><br>このローカル版は動作確認用です。本番公開時はSupabase Auth/RLSとメール送信APIに接続し、管理者だけが注文情報を確認できる構成にしてください。</div><div class="steps"><div class="step active" id="step1">1. 入力</div><div class="step" id="step2">2. 確認</div><div class="step" id="step3">3. 完了</div></div><div class="two"><section class="form-card" id="input-panel"><h2>お客様情報</h2><div class="two"><div><label>お名前</label><input id="name" required></div><div><label>フリガナ</label><input id="kana" required></div></div><div class="two"><div><label>電話番号</label><input id="tel" inputmode="tel" required></div><div><label>メールアドレス</label><input id="email" type="email" required></div></div><div class="two"><div><label>郵便番号</label><input id="zip" inputmode="numeric" placeholder="例：000-0000" required></div><div><label>配送希望</label><select id="delivery"><option>指定なし</option><option>午前中</option><option>14〜16時</option><option>16〜18時</option><option>18〜20時</option><option>19〜21時</option></select></div></div><label>住所</label><input id="address" required><label>備考</label><textarea id="note" placeholder="ご要望があればご記入ください"></textarea><h2>注文商品</h2><div id="product-picker"></div><div class="total-box">合計 <span id="cart-total">¥0</span></div><div class="toolbar"><button class="btn" id="to-confirm">確認画面へ</button></div></section><section class="form-card"><h2>カート</h2><div id="cart-list"></div><p class="muted">決済方法：銀行振込のみ</p><p class="muted">送料は正式運用時に設定してください。</p></section></div><section class="form-card hidden" id="confirm-panel"><h2>注文内容の確認</h2><div id="confirm-body"></div><div class="toolbar"><button class="btn sub" id="back-input">入力に戻る</button><button class="btn ok" id="submit-order">注文を確定する</button></div></section><section class="form-card hidden" id="complete-panel"><h2>ご注文ありがとうございます</h2><p>注文内容を受け付けました。下記の銀行口座へお振込みをお願いいたします。</p><div class="card" id="complete-body"></div><div class="toolbar"><a class="btn" href="index.html">トップへ戻る</a></div></section></div></main><script src="storage.js"></script><script src="order.js"></script></body></html>
